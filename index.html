<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Masters 2026 · Majors</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --green:#1a4a2e;--green-mid:#2a6b43;--green-lt:#3d8a58;
  --gold:#c9a84c;--gold-lt:#e8c97a;--gold-pale:rgba(201,168,76,.15);
  --cream:#fdf9f0;--cream-dk:#ede5d0;
  --red:#b83030;--blue:#1a40a8;
  --text:#1c1c1c;--text-mid:#4a4a4a;--text-lt:#8a8a8a;
  --border:rgba(201,168,76,.28);--shadow:0 6px 32px rgba(0,0,0,.18);--r:8px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%;font-family:'Crimson Pro',Georgia,serif;background:var(--green);color:var(--text);overflow-x:hidden}

/* ── CONNECT SCREEN ─────────── */
.connect-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:var(--green)}
.connect-glow{position:fixed;inset:0;pointer-events:none;background:radial-gradient(ellipse 60% 60% at 20% 50%,rgba(61,138,88,.35) 0%,transparent 70%),radial-gradient(ellipse 50% 40% at 80% 25%,rgba(201,168,76,.12) 0%,transparent 60%)}
.connect-card{background:var(--cream);border-radius:var(--r);padding:36px 32px;width:100%;max-width:480px;box-shadow:var(--shadow);border:1px solid var(--border);position:relative}
.connect-eyebrow{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:4px;color:var(--gold);text-transform:uppercase;margin-bottom:10px}
.connect-title{font-family:'Playfair Display',serif;font-size:30px;font-weight:700;color:var(--green);margin-bottom:4px}
.connect-sub{font-size:15px;color:var(--text-mid);font-style:italic;margin-bottom:26px}
.field-group{margin-bottom:18px}
.field-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--text-mid);text-transform:uppercase;display:block;margin-bottom:6px}
.field-input{width:100%;font-family:'DM Mono',monospace;font-size:14px;border:1px solid #ccc;border-radius:4px;padding:9px 12px;outline:none;background:#fff;transition:border-color .2s;color:var(--text)}
.field-input:focus{border-color:var(--green)}
.field-hint{font-size:12px;color:var(--text-lt);margin-top:4px;font-style:italic}
.connect-divider{border:none;border-top:1px solid var(--cream-dk);margin:20px 0}
.connect-note{font-size:13px;color:var(--text-lt);margin-bottom:20px;line-height:1.6}
.connect-note strong{color:var(--text-mid)}
.btn-connect{width:100%;background:var(--gold);color:var(--green);border:none;padding:13px;font-family:'Playfair Display',serif;font-size:17px;font-weight:700;letter-spacing:1px;border-radius:var(--r);cursor:pointer;transition:all .2s}
.btn-connect:hover{background:var(--gold-lt)}
.connect-err{color:var(--red);font-size:13px;margin-top:10px;display:none}

/* ── LOADING ────────────────── */
.loading-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--cream)}
.loading-title{font-family:'Playfair Display',serif;font-size:26px;margin-bottom:12px;color:var(--cream)}
.loading-sub{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:3px;color:var(--gold)}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:36px;height:36px;border:3px solid rgba(201,168,76,.3);border-top-color:var(--gold);border-radius:50%;animation:spin .9s linear infinite;margin-bottom:20px}

/* ── HEADER ─────────────────── */
.t-header{background:var(--green);border-bottom:2px solid var(--gold);padding:14px 22px;position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.logo-main{font-family:'Playfair Display',serif;font-size:24px;font-weight:700;color:var(--cream);letter-spacing:2px}
.logo-sub{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:4px;color:var(--gold);text-transform:uppercase;margin-top:2px}
.live-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:#4caf50;margin-right:6px;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(.85)}}
.live-badge{font-family:'DM Mono',monospace;font-size:11px;color:#4caf50;letter-spacing:1px;display:flex;align-items:center}
.t-actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.btn-ghost{background:transparent;color:var(--gold);border:1px solid var(--gold);padding:7px 16px;font-family:'DM Mono',monospace;font-size:11px;letter-spacing:1px;text-transform:uppercase;border-radius:var(--r);cursor:pointer;transition:all .2s}
.btn-ghost:hover{background:var(--gold-pale)}
.btn-solid{background:var(--green-mid);color:var(--cream);border:1px solid var(--green-lt);padding:7px 16px;font-family:'DM Mono',monospace;font-size:11px;letter-spacing:1px;text-transform:uppercase;border-radius:var(--r);cursor:pointer;transition:all .2s}
.btn-solid:hover{background:var(--green-lt)}
.btn-gold{background:var(--gold);color:var(--green);border:none;padding:7px 18px;font-family:'DM Mono',monospace;font-size:11px;font-weight:500;letter-spacing:1px;text-transform:uppercase;border-radius:var(--r);cursor:pointer;transition:all .2s}
.btn-gold:hover{background:var(--gold-lt)}
.btn-gold:disabled{opacity:.6;cursor:not-allowed}
.admin-badge{font-family:'DM Mono',monospace;font-size:10px;background:rgba(201,168,76,.2);color:var(--gold);border:1px solid rgba(201,168,76,.4);padding:4px 10px;border-radius:20px;letter-spacing:1px}

/* ── MAIN ───────────────────── */
.t-main{max-width:1100px;margin:0 auto;padding:22px 18px 60px}
.t-status-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px}
.status-pill{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:2px;text-transform:uppercase;padding:4px 12px;border-radius:20px}
.status-pill.active{background:rgba(201,168,76,.2);color:var(--gold);border:1px solid rgba(201,168,76,.4)}
.status-pill.none{color:rgba(253,249,240,.35);border:1px solid rgba(253,249,240,.1)}
.status-pill.cut{background:rgba(255,255,255,.08);color:var(--gold-lt);border:1px solid rgba(201,168,76,.3);margin-left:10px}
.last-update{font-family:'DM Mono',monospace;font-size:10px;color:rgba(253,249,240,.3);letter-spacing:1px}

/* ── LEADERBOARD ────────────── */
.lb{background:var(--cream);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow)}
.lb-thead{display:grid;grid-template-columns:52px 1fr 110px 70px 70px 70px 70px;background:var(--green);padding:11px 16px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--gold);text-transform:uppercase;align-items:center}
.lb-thead div{text-align:center}
.lb-thead div:nth-child(2){text-align:left}
.lb-row-wrap{border-bottom:1px solid #e8dfc8}
.lb-row-wrap:last-child{border-bottom:none}
.lb-row{display:grid;grid-template-columns:52px 1fr 110px 70px 70px 70px 70px;padding:0 16px;cursor:pointer;transition:background .15s;align-items:center}
.lb-row:hover{background:#f5ede0}
.lb-row.open{background:#f0e6d2}
.lb-cell{padding:13px 0;text-align:center;font-size:15px}
.lb-cell.team-name-cell{text-align:left;padding-left:6px}
.rank-badge{width:36px;height:36px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:17px;font-weight:700;margin:0 auto}
.rk1{background:var(--gold);color:var(--green)}.rk2{background:#b8b8b8;color:#222}.rk3{background:#b87333;color:#fff}.rkN{background:#e5dbc8;color:var(--text-mid);font-size:15px}
.team-name-text{font-family:'Playfair Display',serif;font-size:17px;font-weight:600}
.penalty-tag{font-size:11px;font-family:'DM Mono',monospace;color:#a05000;background:#fff3e0;padding:2px 6px;border-radius:3px;margin-left:8px;vertical-align:middle}
.score-val{font-family:'DM Mono',monospace;font-size:19px;font-weight:500}
.score-val.under{color:var(--red)}.score-val.over{color:var(--blue)}.score-val.even{color:var(--text-mid)}
.rd-score{font-family:'DM Mono',monospace;font-size:14px}
.rd-score.under{color:var(--red)}.rd-score.over{color:var(--blue)}.rd-score.even{color:var(--text-lt)}
.lb-breakdown{display:none;padding:0 20px 14px 68px;background:#f0e6d2;border-top:1px solid #e0d4b8}
.lb-breakdown.open{display:block}
.pb-head{display:grid;grid-template-columns:22px 1fr 80px 58px 58px 58px 58px;gap:4px;padding:8px 0 6px;border-bottom:2px solid var(--gold);font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1px;color:var(--text-lt);text-transform:uppercase;align-items:center}
.pb-head div{text-align:center}.pb-head div:nth-child(2){text-align:left}
.pb-row{display:grid;grid-template-columns:22px 1fr 80px 58px 58px 58px 58px;gap:4px;padding:7px 0;border-bottom:1px solid #e0d4b8;align-items:center;font-size:14px}
.pb-row:last-child{border-bottom:none}
.pb-row.counting .pb-name{font-weight:600;color:var(--green)}
.pb-row.missed .pb-name{color:var(--text-lt);text-decoration:line-through}
.pb-dot{width:8px;height:8px;border-radius:50%;margin:0 auto}
.pb-dot.c{background:var(--gold)}.pb-dot.m{background:#ccc}.pb-dot.n{background:#aaa;opacity:.5}
.pb-name{font-size:15px}
.pb-num{font-family:'DM Mono',monospace;font-size:13px;text-align:center}
.pb-penalty-note{margin-top:8px;padding:7px 10px;background:rgba(204,100,0,.1);border-radius:4px;font-size:13px;color:#a05000;font-family:'DM Mono',monospace}
.rules-box{margin-top:22px;padding:14px 18px;background:rgba(255,255,255,.06);border-radius:var(--r);border:1px solid rgba(201,168,76,.2)}
.rules-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--gold);text-transform:uppercase;margin-bottom:6px}
.rules-text{color:rgba(253,249,240,.55);font-size:14px;line-height:1.75}

/* ── MODALS ─────────────────── */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:300;align-items:center;justify-content:center;padding:20px}
.overlay.open{display:flex}
.modal{background:var(--cream);border-radius:var(--r);width:100%;max-width:560px;max-height:88vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.modal.wide{max-width:700px}
.modal-head{padding:18px 22px;border-bottom:2px solid var(--gold);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--cream);z-index:1}
.modal-title{font-family:'Playfair Display',serif;font-size:22px;color:var(--green)}
.modal-x{background:none;border:none;font-size:26px;cursor:pointer;color:var(--text-lt);line-height:1;padding:0 4px}
.modal-body{padding:20px 22px}
.modal-foot{padding:14px 22px;border-top:1px solid var(--cream-dk);display:flex;justify-content:flex-end;gap:10px;position:sticky;bottom:0;background:var(--cream)}
.score-tbl{width:100%;border-collapse:collapse;font-size:14px}
.score-tbl th{text-align:center;padding:8px 10px;background:var(--green);color:var(--gold);font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase}
.score-tbl th:first-child{text-align:left}
.score-tbl td{padding:7px 10px;border-bottom:1px solid #e5dbc8;vertical-align:middle;text-align:center}
.score-tbl td:first-child{text-align:left;font-size:15px}
.score-tbl tr:last-child td{border-bottom:none}
.score-inp{width:70px;text-align:center;font-family:'DM Mono',monospace;font-size:15px;padding:4px 6px;border:1px solid #ccc;border-radius:4px;outline:none;background:#fff}
.score-inp:focus{border-color:var(--green)}
.high-box{background:rgba(201,168,76,.1);border:1px solid var(--gold);border-radius:var(--r);padding:12px 14px;margin-bottom:16px}
.high-box-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--gold);text-transform:uppercase;margin-bottom:8px}
.high-row{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.high-item{display:flex;align-items:center;gap:8px;font-size:14px}
.cut-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:8px;margin-bottom:18px}
.cut-label{display:flex;align-items:center;gap:8px;cursor:pointer;padding:7px 11px;border:1px solid #ddd;border-radius:4px;background:#fff;font-size:15px;transition:border-color .15s}
.cut-label:hover{border-color:var(--green)}
.cut-cb{transform:scale(1.3);accent-color:var(--green)}

/* PIN modal */
.pin-wrap{text-align:center;padding:10px 0}
.pin-input{font-family:'DM Mono',monospace;font-size:28px;letter-spacing:8px;text-align:center;border:2px solid var(--cream-dk);border-radius:var(--r);padding:12px 16px;outline:none;width:180px;background:#fff}
.pin-input:focus{border-color:var(--green)}
.pin-hint{font-size:14px;color:var(--text-lt);margin-top:10px;font-style:italic}
.pin-err{color:var(--red);font-size:13px;margin-top:8px;display:none}

/* ── TEAM CARDS ─────────────── */
.section-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:3px;color:var(--gold);text-transform:uppercase;margin:32px 0 14px}
.team-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;margin-bottom:32px}
.tc{background:var(--cream);border-radius:var(--r);overflow:hidden;box-shadow:var(--shadow)}
.tc-header{background:var(--green);padding:10px 14px;display:flex;align-items:center;justify-content:space-between}
.tc-team-name{font-family:'Playfair Display',serif;font-size:17px;font-weight:700;color:var(--cream)}
.tc-team-score{font-family:'DM Mono',monospace;font-size:18px;font-weight:500}
.tc-team-score.under{color:var(--gold-lt)}.tc-team-score.over{color:#ff9999}.tc-team-score.even{color:rgba(253,249,240,.6)}
.tc-rank{font-family:'DM Mono',monospace;font-size:11px;color:rgba(253,249,240,.45);letter-spacing:1px}
.tc-player-list{padding:6px 0}
.tc-player-row{display:grid;grid-template-columns:20px 1fr 52px 44px 44px 44px 44px;gap:4px;padding:6px 12px;align-items:center;border-bottom:1px solid #ede5d0;font-size:13px}
.tc-player-row:last-child{border-bottom:none}
.tc-player-row.counting{background:rgba(201,168,76,.08)}
.tc-player-row.missed{opacity:.45}
.tc-pdot{width:7px;height:7px;border-radius:50%}
.tc-pdot.c{background:var(--gold)}.tc-pdot.m{background:#bbb}.tc-pdot.n{background:transparent}
.tc-pname{font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tc-pname.counting{font-weight:600;color:var(--green)}
.tc-pname.missed{text-decoration:line-through}
.tc-pscore{font-family:'DM Mono',monospace;font-size:12px;text-align:center}
.tc-pscore.under{color:var(--red)}.tc-pscore.over{color:var(--blue)}.tc-pscore.even{color:var(--text-lt)}
.tc-col-head{display:grid;grid-template-columns:20px 1fr 52px 44px 44px 44px 44px;gap:4px;padding:4px 12px 4px;font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1px;color:var(--text-lt);text-transform:uppercase;border-bottom:1px solid var(--cream-dk)}
.tc-col-head div{text-align:center}.tc-col-head div:nth-child(2){text-align:left}

/* Toast */
.toast{position:fixed;bottom:22px;right:22px;background:var(--green);color:var(--cream);border:1px solid var(--gold);border-radius:var(--r);padding:11px 18px;font-family:'DM Mono',monospace;font-size:13px;z-index:999;transform:translateY(80px);opacity:0;transition:all .3s;max-width:340px}
.toast.show{transform:translateY(0);opacity:1}
.toast.err{background:#6b1515;border-color:#cc4444}

@media(max-width:700px){
  .lb-thead{grid-template-columns:44px 1fr 90px 60px 60px}
  .lb-row{grid-template-columns:44px 1fr 90px 60px 60px}
  .lb-thead .hide,.lb-row .hide{display:none}
  .pb-head{grid-template-columns:18px 1fr 70px 50px 50px}
  .pb-row{grid-template-columns:18px 1fr 70px 50px 50px}
  .pb-head .hide,.pb-row .hide{display:none}
  .lb-breakdown{padding-left:14px}
}
</style>
</head>
<body>
<div id="app"></div>
<div id="toast" class="toast"></div>
<script>
// ══════════════════════════════════════════════
//  TEAM ROSTER (locked in)
// ══════════════════════════════════════════════
const TEAMS = [
  { id:0, name:'JB',     players:['Scottie Scheffler','Min Woo Lee','Russell Henley','Patrick Cantlay','Adam Scott','Sam Burns'] },
  { id:1, name:'CC',     players:['Rory McIlroy','Chris Gotterup','Si Woo Kim','Jake Knapp','Jason Day','Aaron Rai'] },
  { id:2, name:'Zeaph',  players:['Ludvig Åberg','Brooks Koepka','Collin Morikawa','Nico Hojgaard','Harris English','Rasmus Neergaard'] },
  { id:3, name:'Nick',   players:['Bryson DeChambeau','Patrick Reed','Viktor Hovland','Shane Lowry','Daniel Burger','Max Homa'] },
  { id:4, name:'Matt',   players:['Jon Rahm','Robert MacIntyre','Justin Thomas','Corey Conners','Sepp Straka','Keegan Bradley'] },
  { id:5, name:'Austin', players:['Tommy Fleetwood','Hideki Matsuyama','Sahith Bhatia','Jordan Spieth','Gary Woodland','Lanto Griffin'] },
  { id:6, name:'Carson', players:['Cam Young','Justin Rose','Tyrrell Hatton','Maverick McNealy','Marco Penge','Nico Echavarria'] },
  { id:7, name:'TP',     players:['Xander Schauffele','Matt Fitzpatrick','Ryan Fox','Brian Harman','Jacob Bridgeman','JJ Spaun'] },
];

// ══════════════════════════════════════════════
//  GAME STATE (synced via Supabase)
// ══════════════════════════════════════════════
const EMPTY_GAME = { scores:{}, madeCut:{}, cutSet:false, dayHigh:{3:null,4:null} };
let G = JSON.parse(JSON.stringify(EMPTY_GAME)); // game state from Supabase

// ══════════════════════════════════════════════
//  APP STATE (local only)
// ══════════════════════════════════════════════
let sb = null;
let isAdmin = false;
let expandedIds = new Set();
let lastUpdated = null;
let pollTimer = null;
let pendingAdminAction = null; // 'scores' | 'cut'

// ── Supabase config (hardcoded for viewers) ──
const SUPABASE_URL = 'https://bhsuvexkfznspapevhlv.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJoc3V2ZXhrZnpuc3BhcGV2aGx2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2ODAzNTQsImV4cCI6MjA5MTI1NjM1NH0.eJqIJcgNWIqKOL8dY0DWslFBh_x80iBeYOZ2s8smzpc';

const CFG_KEY = 'masters-sb-cfg-v2';
function getCfg(){ try{ return JSON.parse(localStorage.getItem(CFG_KEY)||'null'); }catch{return null;} }
function saveCfg(c){ localStorage.setItem(CFG_KEY, JSON.stringify(c)); }

// ══════════════════════════════════════════════
//  SCORING LOGIC
// ══════════════════════════════════════════════
function currentRound(){
  for(let r=4;r>=1;r--){
    if(Object.values(G.scores).some(ps=>ps[r]!==undefined&&ps[r]!==null)) return r;
  }
  return 0;
}

function playerTotal(name, throughRound){
  if(!G.scores[name]) return null;
  let tot=0,any=false;
  for(let r=1;r<=throughRound;r++){
    if(G.cutSet && G.madeCut[name]===false && r>2) break;
    const s=G.scores[name]?.[r];
    if(s!==undefined&&s!==null){tot+=s;any=true;}
  }
  return any?tot:null;
}

function teamData(team){
  const cr=currentRound();
  const players=team.players.filter(p=>p.trim());
  const pd=players.map(name=>{
    const total=playerTotal(name,cr);
    const madeCut=!G.cutSet||G.madeCut[name]!==false;
    const rounds={};
    for(let r=1;r<=4;r++) rounds[r]=G.scores[name]?.[r]??null;
    return{name,total,madeCut,rounds};
  });
  let eligible=(G.cutSet&&cr>=3)
    ?pd.filter(p=>p.madeCut&&p.total!==null)
    :pd.filter(p=>p.total!==null);
  eligible.sort((a,b)=>a.total-b.total);
  const top3=eligible.slice(0,3);
  let penalty=0;
  const missing=Math.max(0,3-top3.length);
  if(missing>0&&G.cutSet){
    for(let r=3;r<=cr;r++){
      const h=G.dayHigh[r];
      if(h!==null&&h!==undefined) penalty+=missing*h;
    }
  }
  const teamTotal=top3.length>0?top3.reduce((s,p)=>s+p.total,0)+penalty:null;
  const counting=new Set(top3.map(p=>p.name));
  pd.forEach(p=>{p.counting=counting.has(p.name);});
  const rdContrib=[1,2,3,4].map(r=>{
    const rs=pd
      .filter(p=>{if(G.cutSet&&r>=3)return p.madeCut;return true;})
      .map(p=>({s:p.rounds[r]})).filter(x=>x.s!==null&&x.s!==undefined)
      .sort((a,b)=>a.s-b.s).slice(0,3);
    return rs.length?rs.reduce((s,x)=>s+x.s,0):null;
  });
  return{team,pd,top3,teamTotal,penalty,missing,rdContrib};
}

function rankedTeams(){
  return TEAMS.map(teamData).sort((a,b)=>{
    if(a.teamTotal===null&&b.teamTotal===null) return 0;
    if(a.teamTotal===null) return 1;
    if(b.teamTotal===null) return -1;
    return a.teamTotal-b.teamTotal;
  });
}

// ══════════════════════════════════════════════
//  FORMATTING
// ══════════════════════════════════════════════
function fmt(s){if(s===null||s===undefined)return'—';if(s===0)return'E';return s>0?`+${s}`:`${s}`;}
function cls(s){if(s===null||s===0)return'even';return s<0?'under':'over';}
function esc(s){return(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function timeStr(d){if(!d)return'';const t=new Date(d);return t.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});}

async function connectSupabase(pin){
  const { createClient } = supabase;
  sb = createClient(SUPABASE_URL, SUPABASE_KEY);
  // Test + load
  const { data, error } = await sb.from('game_state').select('state,updated_at').eq('id',1).single();
  if(error) throw new Error(error.message);
  if(data?.state) { G = Object.assign(JSON.parse(JSON.stringify(EMPTY_GAME)), data.state); lastUpdated=data.updated_at; }
  // Poll every 20s
  if(pollTimer) clearInterval(pollTimer);
  pollTimer = setInterval(pollState, 20000);
}

async function pollState(){
  if(!sb) return;
  try{
    const { data } = await sb.from('game_state').select('state,updated_at').eq('id',1).single();
    if(data?.state && data.updated_at !== lastUpdated){
      G = Object.assign(JSON.parse(JSON.stringify(EMPTY_GAME)), data.state);
      lastUpdated = data.updated_at;
      render(); toast('Scores updated ↑');
    }
  }catch{}
}

async function saveG(){
  if(!sb) return;
  const { error } = await sb.from('game_state').upsert({id:1, state:G, updated_at:new Date().toISOString()});
  if(error) throw new Error(error.message);
  lastUpdated = new Date().toISOString();
}

// ══════════════════════════════════════════════
//  LIVE SCORE FETCH
// ══════════════════════════════════════════════
function normName(n){ return n.toLowerCase().replace(/[^a-z\s]/g,'').replace(/\s+/g,' ').trim(); }

function matchPlayer(espnName, rosterNames){
  const en = normName(espnName);
  for(const rn of rosterNames){
    const r = normName(rn);
    if(en === r) return rn;
    const enParts=en.split(' '), rnParts=r.split(' ');
    const enLast=enParts[enParts.length-1], rnLast=rnParts[rnParts.length-1];
    if(enLast===rnLast && enLast.length>4){
      if(enParts.length>1&&rnParts.length>1){ if(enParts[0][0]===rnParts[0][0]) return rn; }
      else return rn;
    }
    if(en.includes(r)||r.includes(en)) return rn;
  }
  return null;
}

// Parse ESPN display values like "-4", "E", "+2", "68" into score-to-par
function parseScore(disp, par){
  if(disp === null || disp === undefined) return null;
  const s = String(disp).trim();
  if(s === '' || s === '-') return null;
  if(s === 'E') return 0;
  const n = parseFloat(s);
  if(isNaN(n)) return null;
  // If it looks like raw strokes (60-90), convert to relative to par
  if(n >= 60 && n <= 90) return n - (par || 72);
  // Otherwise treat as already relative to par
  return n;
}

async function fetchLive(){
  const btn=document.getElementById('fetchBtn');
  if(btn){btn.disabled=true;btn.textContent='⟳ Fetching…';}
  const allPlayers=[...new Set(TEAMS.flatMap(t=>t.players.filter(p=>p.trim())))];

  try{
    const resp = await fetch(
      'https://site.api.espn.com/apis/site/v2/sports/golf/leaderboard?league=pga',
      { headers: { 'Accept': 'application/json' } }
    );
    if(!resp.ok) throw new Error(`ESPN API error: ${resp.status}`);
    const data = await resp.json();

    const events = data?.events;
    if(!events?.length) throw new Error('No tournament data found');
    const competitors = events[0]?.competitions?.[0]?.competitors;
    if(!competitors?.length) throw new Error('No competitor data');

    let updated = 0;
    competitors.forEach(comp => {
      const espnName = comp.athlete?.displayName || '';
      const matched = matchPlayer(espnName, allPlayers);
      if(!matched) return;

      if(!G.scores[matched]) G.scores[matched] = {};

      const linescores = comp.linescores || [];
      const par = 72; // Augusta National

      // Total score to par — prefer displayValue ("E", "-5") over raw value
      const totalToPar = parseScore(comp.score?.displayValue, par)
                      ?? parseScore(comp.score?.value, par);

      const inProgress = comp.status?.type?.name === 'STATUS_IN_PROGRESS';

      let completedSum = 0;
      let roundsComplete = 0;

      linescores.forEach((ls, idx) => {
        const r = idx + 1;
        if(r > 4) return;

        // Use displayValue first ("68", "-4", "E"), then fall back to value
        const disp = ls.displayValue ?? ls.value;
        const score = parseScore(disp, par);
        if(score === null) return;

        // Only store if this is a complete round (not the in-progress one)
        // A complete round: value is strokes 60-90, or we're not in progress yet
        const rawVal = ls.value ?? 0;
        const isCompleteRound = rawVal >= 60 || (!inProgress);

        if(isCompleteRound){
          G.scores[matched][r] = score;
          completedSum += score;
          roundsComplete = r;
          updated++;
        }
      });

      // In-progress round: use total-to-par minus completed rounds
      // This gives score relative to par on only the holes played so far
      if(inProgress && totalToPar !== null){
        const currentRound = roundsComplete + 1;
        if(currentRound <= 4){
          G.scores[matched][currentRound] = totalToPar - completedSum;
          updated++;
        }
      }
    });

    if(updated === 0) throw new Error('No matching players found — tournament may not have started yet');

    autoHighScores();
    await saveG();
    render();
    toast(`Synced scores for ${competitors.filter(c=>matchPlayer(c.athlete?.displayName||'',allPlayers)).length} players ✓`);
  }catch(e){
    if(btn){btn.disabled=false;btn.textContent='⚡ Live Scores';}
    render();
    toast(`Fetch failed: ${e.message}`,'err');
  }
}

  }
}

function autoHighScores(){
  const allPlayers=[...new Set(TEAMS.flatMap(t=>t.players.filter(p=>p.trim())))];
  [3,4].forEach(r=>{
    if(G.dayHigh[r]!==null&&G.dayHigh[r]!==undefined) return;
    const scores=allPlayers.map(n=>G.scores[n]?.[r]).filter(s=>s!==null&&s!==undefined);
    if(scores.length) G.dayHigh[r]=Math.max(...scores);
  });
}

//  TOAST
// ══════════════════════════════════════════════
let toastTimer;
function toast(msg,type=''){
  const el=document.getElementById('toast');
  el.textContent=msg;
  el.className='toast show'+(type==='err'?' err':'');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.classList.remove('show'),3200);
}

  }
  render();
})();
